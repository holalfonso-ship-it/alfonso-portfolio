<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px; height: 800px;
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    overflow: hidden; position: relative;
  }

  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .glow {
    position: absolute; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, transparent 70%);
    top: -150px; right: -150px;
  }

  .glow2 {
    position: absolute; width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
    bottom: -100px; left: -80px;
  }

  .wrapper {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: space-between; height: 100%; padding: 64px;
  }

  .top { display: flex; flex-direction: column; gap: 24px; }

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.35);
    border-radius: 100px; padding: 7px 18px; width: fit-content;
  }
  .badge-dot { width: 7px; height: 7px; background: #3b82f6; border-radius: 50%; }
  .badge span { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #3b82f6; }

  h1 { font-size: 64px; font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; color: #fff; }
  h1 em { font-style: normal; color: #3b82f6; }

  /* Heuristic rows */
  .heuristics { display: flex; flex-direction: column; gap: 10px; }

  .h-row {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 13px 16px;
    display: flex; align-items: center; gap: 12px;
  }

  .h-row.active {
    background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3);
    position: relative; overflow: hidden;
  }

  .h-row.active::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: #3b82f6; border-radius: 3px 0 0 3px;
  }

  .h-num {
    width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35);
  }

  .h-row.active .h-num { background: rgba(59,130,246,0.2); color: #3b82f6; }

  .h-name { font-size: 13px; font-weight: 600; flex: 1; color: rgba(255,255,255,0.4); }
  .h-row.active .h-name { color: rgba(255,255,255,0.85); }

  .dots { display: flex; gap: 4px; }
  .dot { width: 9px; height: 9px; border-radius: 2px; background: rgba(255,255,255,0.1); }
  .dot.f { background: #3b82f6; }
  .dot.w { background: #f59e0b; }
  .dot.r { background: #ef4444; }

  .bottom { display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-dot { width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; }
  .brand span { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.25); letter-spacing: 0.06em; }

  .price-tag {
    background: rgba(59,130,246,0.9); color: white;
    font-size: 26px; font-weight: 800; padding: 12px 26px;
    border-radius: 14px; letter-spacing: -0.02em;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="wrapper">
    <div class="top">
      <div class="badge"><div class="badge-dot"></div><span>Framework</span></div>
      <h1>UX Audit<br /><em>Framework</em></h1>
    </div>

    <div class="heuristics">
      <div class="h-row active">
        <div class="h-num">01</div>
        <div class="h-name">Visibility of System Status</div>
        <div class="dots"><div class="dot w"></div><div class="dot w"></div><div class="dot w"></div><div class="dot"></div></div>
      </div>
      <div class="h-row active">
        <div class="h-num">05</div>
        <div class="h-name">Error Prevention</div>
        <div class="dots"><div class="dot r"></div><div class="dot r"></div><div class="dot r"></div><div class="dot r"></div></div>
      </div>
      <div class="h-row">
        <div class="h-num">06</div>
        <div class="h-name">Recognition Over Recall</div>
        <div class="dots"><div class="dot f"></div><div class="dot f"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
      <div class="h-row">
        <div class="h-num">08</div>
        <div class="h-name">Aesthetic & Minimalist Design</div>
        <div class="dots"><div class="dot f"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
      <div class="h-row">
        <div class="h-num">10</div>
        <div class="h-name">Help & Documentation</div>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
    </div>

    <div class="bottom">
      <div class="brand"><div class="brand-dot"></div><span>azportfolio.net</span></div>
      <div class="price-tag">€39</div>
    </div>
  </div>
</body>
</html>
