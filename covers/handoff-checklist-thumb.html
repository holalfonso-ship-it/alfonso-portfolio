<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px; height: 800px;
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    overflow: hidden; position: relative;
  }

  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .glow {
    position: absolute; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, transparent 70%);
    top: -150px; right: -150px;
  }

  .glow2 {
    position: absolute; width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
    bottom: -100px; left: -80px;
  }

  .wrapper {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: space-between; height: 100%; padding: 64px;
  }

  .top { display: flex; flex-direction: column; gap: 24px; }

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.35);
    border-radius: 100px; padding: 7px 18px; width: fit-content;
  }
  .badge-dot { width: 7px; height: 7px; background: #3b82f6; border-radius: 50%; }
  .badge span { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #3b82f6; }

  h1 { font-size: 60px; font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; color: #fff; }
  h1 em { font-style: normal; color: #3b82f6; }

  /* Checklist */
  .checklist { display: flex; flex-direction: column; gap: 10px; }

  .check-row {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 13px 16px;
  }

  .check-row.active {
    background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3);
    position: relative; overflow: hidden;
  }

  .check-row.active::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: #3b82f6; border-radius: 3px 0 0 3px;
  }

  .check-icon {
    width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .check-icon.done { background: rgba(34,197,94,0.2); }
  .check-icon.now { background: rgba(59,130,246,0.2); }
  .check-icon svg { width: 13px; height: 13px; }

  .check-text { font-size: 14px; font-weight: 600; flex: 1; color: rgba(255,255,255,0.4); }
  .check-row.active .check-text { color: rgba(255,255,255,0.9); }

  .check-tag {
    font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
    color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.06);
  }
  .check-row.active .check-tag { color: #3b82f6; background: rgba(59,130,246,0.15); }

  /* Stats */
  .stats { display: flex; gap: 10px; }
  .stat {
    flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 14px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .stat-num { font-size: 28px; font-weight: 800; color: #3b82f6; letter-spacing: -0.03em; }
  .stat-label { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.3); text-align: center; }

  .bottom { display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-dot { width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; }
  .brand span { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.25); letter-spacing: 0.06em; }

  .free-tag {
    background: rgba(34,197,94,0.9); color: white;
    font-size: 26px; font-weight: 800; padding: 12px 26px;
    border-radius: 14px; letter-spacing: -0.01em;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="wrapper">
    <div class="top">
      <div class="badge"><div class="badge-dot"></div><span>Checklist</span></div>
      <h1>Design ↔ Dev<br /><em>Handoff Checklist</em></h1>
    </div>

    <div class="checklist">
      <div class="check-row">
        <div class="check-icon done"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="check-text">File & frame organisation</div>
        <div class="check-tag">Structure</div>
      </div>
      <div class="check-row">
        <div class="check-icon done"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="check-text">Design tokens & styles</div>
        <div class="check-tag">Tokens</div>
      </div>
      <div class="check-row active">
        <div class="check-icon now"><svg viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="3" fill="#3b82f6"/></svg></div>
        <div class="check-text">Interactive states & flows</div>
        <div class="check-tag">States</div>
      </div>
      <div class="check-row">
        <div class="check-icon done"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="check-text">Accessibility annotations</div>
        <div class="check-tag">A11y</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-num">8</div><div class="stat-label">Sections</div></div>
      <div class="stat"><div class="stat-num">50+</div><div class="stat-label">Checks</div></div>
      <div class="stat"><div class="stat-num">1×</div><div class="stat-label">Click duplicate</div></div>
    </div>

    <div class="bottom">
      <div class="brand"><div class="brand-dot"></div><span>azportfolio.net</span></div>
      <div class="free-tag">Free</div>
    </div>
  </div>
</body>
</html>
